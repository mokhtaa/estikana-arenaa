<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - سيستم الحجز المطور</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🔐 إعدادات الربط الحية بالداتا بيز الخاصة بك (مأخوذة من لقطات شاشتك)
        const SUPABASE_URL = "https://wiugwyhpuhokhocttwbq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_zzDhn9DNIAdjJLn8aNzKzA_4IapbzcL";
        
        // إنشاء اتصال بقاعدة البيانات
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // مواعيد العمل من 1 ظهراً (13:00) إلى 12 منتصف الليل (24:00)
        const TIME_SLOTS = [
          "13:00", "14:00", "15:00", "16:00", "17:00", "18:00",
          "19:00", "20:00", "21:00", "22:00", "23:00", "24:00"
        ];

        const FIELD_NAME = "استكانه أرينا";
        const ADMIN_PASSWORD = "19541954";

        function formatTo12Hour(timeStr) {
          let hour = parseInt(timeStr.split(":")[0]);
          if (hour === 24 || hour === 0) return "12:00 م";
          if (hour === 12) return "12:00 ظ";
          const period = hour >= 12 ? "م" : "ص";
          const adjustedHour = hour > 12 ? hour - 12 : hour;
          return `${String(adjustedHour).padStart(2, '0')}:00 ${period}`;
        }

        function getPriceForSlot(timeStr) {
          const hour = parseInt(timeStr.split(":")[0]);
          return hour >= 13 && hour < 16 ? 100 : 150;
        }

        function calculateBookingPrice(startTime, duration) {
          const startIdx = TIME_SLOTS.indexOf(startTime);
          if (startIdx === -1) return 0;
          let total = 0;
          for (let i = 0; i < duration; i++) {
            const slotTime = TIME_SLOTS[startIdx + i];
            if (slotTime) total += getPriceForSlot(slotTime);
          }
          return total;
        }

        function todayStr() { return new Date().toISOString().split("T")[0]; }

        function formatDate(d) {
          return new Date(d + "T00:00:00").toLocaleDateString("ar-EG", {
            weekday: "long", year: "numeric", month: "long", day: "numeric"
          });
        }

        function genId() { return Math.random().toString(36).slice(2, 9).toUpperCase(); }

        function openWA(phone, message) {
          window.open(`https://wa.me/2${phone}?text=${encodeURIComponent(message)}`, "_blank");
        }

        function buildConfirmMsg(b) {
          return `مرحباً ${b.name} 👋\n\n✅ *تم تأكيد حجزك في ${FIELD_NAME}* ⚽\n\n━━━━━━━━━━━━━━━━━━\n📅 التاريخ : ${formatDate(b.date)}\n⏰ الوقت   : ${formatTo12Hour(b.time)}\n⏱ المدة   : ${b.duration} ساعة\n💰 المبلغ  : ${b.price} جنيه\n━━━━━━━━━━━━━━━━━━\n\nبرجاء الحضور قبل الموعد بـ 10 دقائق 🙏\nنتمنى لك وقت ممتع! 🌟`;
        }

        function App() {
          const [view, setView] = useState("booking");
          const [bookings, setBookings] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedDate, setSelectedDate] = useState(todayStr());
          const [adminDate, setAdminDate] = useState(todayStr());
          const [modal, setModal] = useState(null);
          const [form, setForm] = useState({ name: "", phone: "", duration: "1" });
          const [formError, setFormError] = useState("");
          const [toast, setToast] = useState({ msg: "", type: "success" });
          const [adminTab, setAdminTab] = useState("pending");
          const [adminPass, setAdminPass] = useState("");
          const [adminUnlocked, setAdminUnlocked] = useState(() => localStorage.getItem("estikana_admin_logged") === "true");
          const [passError, setPassError] = useState("");
          const [detailModal, setDetailModal] = useState(null);
          const [confirmModal, setConfirmModal] = useState(null);

          // جلب الحجوزات اللحظية من الداتا بيز عند فتح الصفحة
          useEffect(() => {
            fetchBookings();
            // الاستماع للتغييرات اللحظية (Realtime)
            const channels = supabaseClient.channel('custom-all-channel')
              .on('postgres_changes', { event: '*', filter: 'table=eq.bookings' }, () => { fetchBookings(); })
              .subscribe();
            return () => { channels.unsubscribe(); };
          }, []);

          async function fetchBookings() {
            const { data, error } = await supabaseClient.from('bookings').select('*');
            if (!error && data) setBookings(data);
            setLoading(false);
          }

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            setView(params.get("view") === "admin" ? "admin" : "booking");
          }, []);

          function isTimeInPast(timeStr, dateStr) {
            if (dateStr !== todayStr()) return false;
            const now = new Date();
            const currentHour = now.getHours();
            const slotHour = parseInt(timeStr.split(":")[0]);
            return slotHour <= currentHour;
          }

          const dayBookings = bookings.filter(b => b.date === selectedDate && b.status !== "cancelled");
          const bookedSlots = new Set();
          dayBookings.forEach(b => {
            for (let i = 0; i < b.duration; i++) {
              const idx = TIME_SLOTS.indexOf(b.time);
              if (idx !== -1 && idx + i < TIME_SLOTS.length) bookedSlots.add(TIME_SLOTS[idx + i]);
            }
          });

          function isSlotAvailable(time, duration = 1) {
            const idx = TIME_SLOTS.indexOf(time);
            for (let i = 0; i < duration; i++) {
              if (idx + i >= TIME_SLOTS.length || bookedSlots.has(TIME_SLOTS[idx + i])) return false;
            }
            return true;
          }

          function showToast(msg, type = "success") {
            setToast({ msg, type });
            setTimeout(() => setToast({ msg: "", type: "success" }), 4000);
          }

          async function handleBook() {
            setFormError("");
            if (!form.name.trim()) { setFormError("من فضلك أدخل الاسم"); return; }
            if (!form.phone.match(/^01[0-9]{9}$/)) { setFormError("رقم الهاتف غير صحيح"); return; }
            const dur = parseInt(form.duration);
            if (!isSlotAvailable(modal.time, dur)) { setFormError("الموعد غير متاح"); return; }

            const newBooking = {
              id: genId(),
              name: form.name.trim(),
              phone: form.phone.trim(),
              date: selectedDate,
              time: modal.time,
              duration: dur,
              price: calculateBookingPrice(modal.time, dur),
              status: "pending",
              paid: false
            };

            const { error } = await supabaseClient.from('bookings').insert([newBooking]);
            if (error) {
              showToast("حدث خطأ أثناء إرسال الطلب", "warn");
            } else {
              setModal(null);
              setForm({ name: "", phone: "", duration: "1" });
              showToast("✅ تم حجز الموعد بنجاح وحفظه سحابياً!");
              fetchBookings();
            }
          }

          async function doConfirm(b) {
            const { error } = await supabaseClient.from('bookings').update({ status: 'confirmed' }).eq('id', b.id);
            if (!error) {
              setConfirmModal(null);
              openWA(b.phone, buildConfirmMsg(b));
              showToast("✅ تم تأكيد الحجز ونقل الحالة!");
              fetchBookings();
            }
          }

          async function togglePaid(id, currentPaid) {
            await supabaseClient.from('bookings').update({ paid: !currentPaid }).eq('id', id);
            setDetailModal(prev => prev ? { ...prev, paid: !currentPaid } : null);
            fetchBookings();
          }

          async function cancelBooking(id) {
            if (!window.confirm("هل تريد إلغاء الحجز؟")) return;
            await supabaseClient.from('bookings').update({ status: 'cancelled' }).eq('id', id);
            setDetailModal(null);
            showToast("🚫 تم إلغاء الحجز بنجاح");
            fetchBookings();
          }

          function handleAdminLogin() {
            if (adminPass === ADMIN_PASSWORD) { 
              setAdminUnlocked(true); 
              localStorage.setItem("estikana_admin_logged", "true");
            } else { setPassError("كلمة المرور خاطئة"); }
          }

          const adminDayAll = bookings.filter(b => b.date === adminDate);
          const pendingList = adminDayAll.filter(b => b.status === "pending");
          const confirmedList = adminDayAll.filter(b => b.status === "confirmed");

          return (
            <div class="min-h-screen flex flex-col">
              <header class="bg-slate-800 px-6 py-4 flex justify-between items-center border-b-2 border-emerald-500 shadow-xl">
                <div class="text-2xl font-black text-emerald-400">⚽ {FIELD_NAME}</div>
                {view === "admin" && adminUnlocked && (
                  <button onClick={() => { setAdminUnlocked(false); localStorage.removeItem("estikana_admin_logged"); }} class="bg-red-700 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold">خروج 🚪</button>
                )}
              </header>

              {toast.msg && (
                <div class={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-bold text-slate-900 z-50 ${toast.type === "warn" ? "bg-amber-500" : "bg-emerald-400"}`}>
                  {toast.msg}
                </div>
              )}

              {loading ? <div class="flex-1 flex items-center justify-center text-slate-400 text-lg">🔄 جاري مزامنة الداتا بيز اللحظية...</div> : (
                view === "booking" ? (
                  <div class="max-w-4xl w-full mx-auto p-4 md:p-6 flex-1">
                    <div class="text-center py-6">
                      <h1 class="text-3xl font-black text-emerald-400">احجز ملعبك دلوقتي أونلاين</h1>
                      <p class="text-slate-400 mt-2">تحديث فوري للمواعيد المتاحة والأسعار</p>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl mb-6 border border-slate-700 shadow-md">
                      <label class="block text-slate-400 text-sm font-bold mb-2">📅 اختار يوم الحجز</label>
                      <input type="date" value={selectedDate} min={todayStr()} onChange={e => setSelectedDate(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 w-full text-white font-bold" />
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                      {TIME_SLOTS.map(time => {
                        const booked = bookedSlots.has(time);
                        const past = isTimeInPast(time, selectedDate);
                        const unavailable = booked || past;
                        return (
                          <div key={time} onClick={() => !unavailable && setModal({ time })} class={`p-4 rounded-xl text-center border cursor-pointer transition ${unavailable ? "bg-slate-950/40 border-slate-700 text-slate-600 cursor-not-allowed" : "bg-emerald-950 border-emerald-500 hover:border-emerald-400 text-emerald-300"}`}>
                            <span class="text-lg font-bold block">{formatTo12Hour(time)}</span>
                            <span class="text-xs">{booked ? "محجوز" : past ? "انتهى" : `${getPriceForSlot(time)} ج`}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div class="max-w-4xl w-full mx-auto p-4 md:p-6 flex-1">
                    {!adminUnlocked ? (
                      <div class="bg-slate-800 p-6 rounded-2xl max-w-sm mx-auto my-12 border border-slate-700 shadow-2xl text-center">
                        <h2 class="text-xl font-black text-emerald-400 mb-4">دخول الإدارة</h2>
                        <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-center text-white mb-2" placeholder="الباسورد" />
                        {passError && <p class="text-red-400 text-xs">{passError}</p>}
                        <button style={{width:'100%'}} class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-2 px-4 rounded-xl mt-2" onClick={handleAdminLogin}>دخول</button>
                      </div>
                    ) : (
                      <div>
                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                          <h2 class="text-2xl font-black text-emerald-400">🏟️ لوحة التحكم</h2>
                          <div class="flex bg-slate-800 p-1 rounded-xl">
                            {["pending", "confirmed", "all"].map(t => (
                              <button key={t} class={`px-4 py-1.5 rounded-lg text-sm font-bold ${adminTab === t ? "bg-emerald-500 text-slate-900" : "text-slate-400"}`} onClick={() => setAdminTab(t)}>{t === "all" ? "الكل" : t === "pending" ? "انتظار" : "مؤكد"}</button>
                            ))}
                          </div>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-2xl mb-6 border border-slate-700 shadow-md">
                          <input type="date" value={adminDate} onChange={e => setAdminDate(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 w-full text-white font-bold" />
                        </div>
                        <div class="space-y-2">
                          {adminTab === "pending" && pendingList.map(b => (
                            <div key={b.id} class="bg-slate-800 hover:bg-slate-750 p-4 rounded-xl border border-amber-500/30 flex justify-between cursor-pointer" onClick={() => setDetailModal(b)}>
                              <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ({b.duration}س)</div>
                              <button class="text-emerald-400 text-xs">إدارة ←</button>
                            </div>
                          ))}
                          {adminTab === "confirmed" && confirmedList.map(b => (
                            <div key={b.id} class="bg-slate-800 p-4 rounded-xl border border-emerald-500 flex justify-between cursor-pointer" onClick={() => setDetailModal(b)}>
                              <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ✅</div>
                              <span class="text-slate-400 text-xs">{b.duration}س</span>
                            </div>
                          ))}
                          {adminTab === "all" && adminDayAll.map(b => (
                            <div key={b.id} class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between cursor-pointer" onClick={() => setDetailModal(b)}>
                              <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ({b.status})</div>
                              <span class="text-slate-400 text-xs">{b.paid ? "مدفوع" : "غير مدفوع"}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )
              )}

              {/* المودال الخاص بطلب الحجز والتأكيد يفتح انسيابياً كالسابق تماماً */}
              {modal && (
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn" onClick={() => setModal(null)}>
                  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <h2 class="text-xl font-black text-emerald-400 mb-4">📋 طلب حجز جديد</h2>
                    <p class="text-sm text-slate-300 mb-4">الموعد: <span class="font-bold text-white">{formatTo12Hour(modal.time)}</span> يوم {formatDate(selectedDate)}</p>
                    <div class="space-y-3">
                      <div>
                        <label class="block text-slate-400 text-xs font-bold mb-1">الاسم</label>
                        <input onChange={e => setForm({ ...form, name: e.target.value })} style={{width:'100%'}} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white" />
                      </div>
                      <div>
                        <label class="block text-slate-400 text-xs font-bold mb-1">رقم الواتساب</label>
                        <input onChange={e => setForm({ ...form, phone: e.target.value })} style={{width:'100%'}} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white" />
                      </div>
                      <div>
                        <label class="block text-slate-400 text-xs font-bold mb-1">المدة</label>
                        <select onChange={e => setForm({ ...form, duration: e.target.value })} style={{width:'100%'}} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white">
                          <option value="1">ساعة واحدة</option>
                          <option value="2">ساعتين</option>
                        </select>
                      </div>
                      <div class="p-3 bg-slate-900 rounded-xl text-center">
                        <span class="text-sm text-slate-400">إجمالي الحساب:</span>
                        <div class="text-2xl font-black text-emerald-400 mt-1">
                          {calculateBookingPrice(modal.time, parseInt(form.duration))} ج
                        </div>
                      </div>
                      {formError && <p class="text-red-400 text-xs">{formError}</p>}
                      <div class="flex gap-2 pt-2">
                        <button class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl" onClick={handleBook}>✅ إرسال طلب الحجز</button>
                        <button class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl" onClick={() => setModal(null)}>إلغاء</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {detailModal && (
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={() => setDetailModal(null)}>
                  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                    <h2 class="text-xl font-black text-emerald-400 mb-4">تفاصيل حجز الكابتن: {detailModal.name}</h2>
                    <p class="text-white text-base">الموعد: {formatTo12Hour(detailModal.time)} ({detailModal.duration}س)</p>
                    <p class="text-slate-300">الحالة: {detailModal.status === "confirmed" ? "مؤكدة ✅" : detailModal.status === "cancelled" ? "ملغية 🚫" : "في الانتظار ⏳"}</p>
                    <p class="text-slate-300 mb-4">الدفع: {detailModal.paid ? "مدفوع ✅" : "غير مدفوع 🔴"} - {detailModal.price} ج</p>
                    <div class="flex flex-col gap-2">
                      {detailModal.status === "pending" && <button class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl" onClick={() => doConfirm(detailModal)}>✔️ تأكيد وفتح واتساب للزبون</button>}
                      <button class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded-xl" onClick={() => togglePaid(detailModal.id, detailModal.paid)}>تغيير حالة الدفع</button>
                      <button class="bg-red-900/40 hover:bg-red-900 text-red-400 font-bold py-2 px-4 rounded-xl" onClick={() => cancelBooking(detailModal.id)}>🚫 إلغاء الحجز</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
