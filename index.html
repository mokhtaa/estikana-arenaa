<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - الإدارة الشاملة المؤمنة</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a !important;
            font-family: system-ui, -apple-system, sans-serif;
            direction: rtl;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel">
        const useState = React.useState;
        const useEffect = React.useEffect;

        const SUPABASE_URL = "https://wiugwyhpuhokhocttwbq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_zzDhn9DNIAdjJLn8aNzKzA_4IapbzcL";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TIME_SLOTS = [
          "1:00 ظهراً", "2:00 ظهراً", "3:00 عصراً", "4:00 عصراً", 
          "5:00 مساءً", "6:00 مساءً", "7:00 مساءً", "8:00 مساءً", 
          "9:00 مساءً", "10:00 مساءً", "11:00 مساءً", "12:00 مساءً"
        ];

        const FIELD_NAME = "استكانه أرينا";

        function parseTo24Hour(timeStr) {
          if (!timeStr || typeof timeStr !== 'string' || !timeStr.includes(':')) return 0;
          try {
            const hour = parseInt(timeStr.split(":")[0]);
            if (!timeStr.includes("ظهراً") && !timeStr.includes("عصراً") && !timeStr.includes("مساءً")) return hour;
            if (timeStr.includes("ظهراً") || timeStr.includes("عصراً")) return hour + 12; 
            if (timeStr.includes("مساءً")) {
              if (hour === 12) return 24;
              return hour + 12;
            }
            return hour;
          } catch (e) { return 0; }
        }

        function getPriceForSlot(timeStr) {
          const hour24 = parseTo24Hour(timeStr);
          return hour24 >= 13 && hour24 <= 18 ? 100 : 150;
        }

        function calculateBookingPrice(startTime, duration) {
          const startIdx = TIME_SLOTS.indexOf(startTime);
          if (startIdx === -1) return 0;
          let total = 0;
          for (let i = 0; i < duration; i++) {
            const slotTime = TIME_SLOTS[startIdx + i];
            if (slotTime) total += getPriceForSlot(slotTime);
          }
          return total;
        }

        function todayStr() { return new Date().toISOString().split("T")[0]; }

        const S = {
          root: { minHeight: "100vh", background: "#0f172a", color: "#f1f5f9", display: "flex", flexDirection: "column" },
          contentWrapper: { flex: 1 },
          header: { background: "#1e293b", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "2px solid #22c55e" },
          logo: { fontSize: 22, fontWeight: 800, color: "#22c55e" },
          toast: { position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", color: "#fff", padding: "12px 28px", borderRadius: 10, zIndex: 999, fontWeight: 'bold' },
          page: { maxWidth: 820, margin: "0 auto", padding: "24px 16px", width: "100%", boxSizing: "border-box" },
          hero: { textAlign: "center", padding: "20px 0" },
          heroTitle: { fontSize: 32, fontWeight: 800, color: "#22c55e", margin: 0 },
          heroSub: { color: "#94a3b8", marginTop: 8, fontSize: 16 },
          card: { background: "#1e293b", borderRadius: 12, padding: 16, marginBottom: 16, border: "1px solid #334155" },
          label: { display: "block", color: "#94a3b8", marginBottom: 8, fontWeight: 600 },
          dateInput: { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "12px", borderRadius: 8, width: "100%", boxSizing: "border-box", fontSize: 16 },
          legendRow: { display: "flex", gap: 12, marginBottom: 16 },
          chip: (color, bg) => ({ background: bg, color: color, borderRadius: 20, padding: "6px 14px", fontSize: 13, fontWeight: 'bold' }),
          slotsGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(120px,1fr))", gap: 12 },
          slot: { padding: "16px 8px", borderRadius: 12, textAlign: "center", cursor: "pointer" },
          slotFree: { background: "#14532d", border: "1px solid #22c55e", color: "#4ade80" },
          slotBooked: { background: "#2d1a1a", border: "1px solid #ef4444", color: "#f87171", cursor: "not-allowed", opacity: 0.8 },
          slotTime: { display: "block", fontWeight: 800, fontSize: 15 },
          slotLabel: { display: "block", fontSize: 12, marginTop: 4 },
          overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16 },
          modalCard: { background: "#1e293b", borderRadius: 16, padding: 24, width: "100%", maxWidth: 420, border: "1px solid #334155" },
          modalTitle: { color: "#22c55e", fontSize: 22, margin: 0, fontWeight: 800 },
          formGroup: { marginBottom: 16 },
          input: { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "12px", borderRadius: 8, width: "100%", boxSizing: "border-box", fontSize: 15 },
          select: { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "12px", borderRadius: 8, width: "100%", boxSizing: "border-box", fontSize: 15, cursor: "pointer" },
          errMsg: { color: "#f87171", fontSize: 14, fontWeight: "bold", margin: "10px 0" },
          row: { display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 20 },
          btnGreen: { background: "#22c55e", color: "#0f172a", border: "none", padding: "12px 24px", borderRadius: 8, fontWeight: 800, cursor: "pointer", fontSize: 15 },
          btnGray: { background: "#334155", color: "#f1f5f9", border: "none", padding: "12px 24px", borderRadius: 8, cursor: "pointer", fontSize: 15 },
          loginCard: { background: "#1e293b", borderRadius: 16, padding: 32, maxWidth: 400, margin: "40px auto", border: "1px solid #334155" },
          bookingCard: { background: "#1e293b", borderRadius: 12, padding: 16, marginBottom: 12, border: "1px solid #334155" },
          bookingTop: { display: "flex", justifyContent: "space-between", alignItems: "center" },
          bookingMid: { display: "flex", gap: 16, color: "#94a3b8", fontSize: 14, marginTop: 12 },
          adminTop: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 },
          adminTitle: { fontSize: 22, margin: 0 },
          tabs: { display: "flex", gap: 8 },
          tab: { background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", padding: "8px 16px", borderRadius: 8, cursor: "pointer" },
          tabActive: { background: "#22c55e", color: "#0f172a", fontWeight: 800, border: "1px solid #22c55e", padding: "8px 16px", borderRadius: 8, cursor: "pointer" }
        };

        function App() {
          const [view, setView] = useState("booking");
          const [bookings, setBookings] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedDate, setSelectedDate] = useState(todayStr());
          const [adminDate, setAdminDate] = useState(todayStr());
          const [modal, setModal] = useState(null);
          const [form, setForm] = useState({ name: "", phone: "", duration: "1" });
          const [formError, setFormError] = useState("");
          const [toast, setToast] = useState({ msg: "", type: "success" });
          const [adminTab, setAdminTab] = useState("pending");
          const [adminPass, setAdminPass] = useState("");
          const [adminUnlocked, setAdminUnlocked] = useState(() => localStorage.getItem("estikana_admin_logged") === "true");
          const [passError, setPassError] = useState("");

          useEffect(() => {
            fetchBookings();
            const channels = supabaseClient.channel('custom-all-channel')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, () => { fetchBookings(); })
              .subscribe();
            return () => { channels.unsubscribe(); };
          }, []);

          async function fetchBookings() {
            try {
              const { data, error } = await supabaseClient.from('bookings').select('*');
              if (!error && data) setBookings(data);
            } catch (e) { console.error(e); }
            setLoading(false);
          }

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get("view") === "admin") { setView("admin"); } 
            else { setView("booking"); }
          }, []);

          function isTimeInPast(timeStr, dateStr) {
            if (dateStr !== todayStr()) return false;
            const now = new Date();
            return parseTo24Hour(timeStr) <= now.getHours();
          }

          const dayBookings = bookings.filter(b => b.date === selectedDate && b.status !== "cancelled");
          const bookedSlots = new Set();
          dayBookings.forEach(b => {
            const dur = parseInt(b.duration || 1);
            for (let i = 0; i < dur; i++) {
              const idx = TIME_SLOTS.indexOf(b.time);
              if (idx !== -1 && idx + i < TIME_SLOTS.length) bookedSlots.add(TIME_SLOTS[idx + i]);
            }
          });

          function isSlotAvailable(time, duration = 1) {
            const idx = TIME_SLOTS.indexOf(time);
            for (let i = 0; i < duration; i++) {
              if (idx + i >= TIME_SLOTS.length || bookedSlots.has(TIME_SLOTS[idx + i])) return false;
            }
            return true;
          }

          function showToast(msg, type = "success") {
            setToast({ msg, type });
            setTimeout(() => setToast({ msg: "", type: "success" }), 4000);
          }

          async function handleBook() {
            setFormError("");
            if (!form.name.trim()) { setFormError("من فضلك أدخل الاسم"); return; }
            if (!form.phone.match(/^01[0-9]{9}$/)) { setFormError("رقم الواتس اب غير صحيح"); return; }
            const dur = parseInt(form.duration);
            if (!isSlotAvailable(modal.time, dur)) { setFormError("عذراً، الساعات المحددة تتداخل مع حجز آخر!"); return; }

            const calculatedPrice = calculateBookingPrice(modal.time, dur);

            const newBooking = {
              id: Math.random().toString(36).slice(2, 9).toUpperCase(), name: form.name.trim(), phone: form.phone.trim(),
              date: selectedDate, time: modal.time, duration: dur,
              price: calculatedPrice, status: "pending", paid: false
            };

            const { error } = await supabaseClient.from('bookings').insert([newBooking]);
            if (error) { showToast("حدث خطأ أثناء حفظ الحجز", "warn"); } 
            else {
              setModal(null); setForm({ name: "", phone: "", duration: "1" });
              showToast("✅ تم استلام طلب حجزك وحفظه أونلاين!");
              fetchBookings();
            }
          }

          async function handleAdminLogin() {
            if (!adminPass.trim()) return;
            setPassError("");
            try {
              const { data, error } = await supabaseClient.from('admin_config').select('value').eq('key', 'admin_password').single();
              if (!error && data && data.value === adminPass.trim()) {
                setAdminUnlocked(true);
                localStorage.setItem("estikana_admin_logged", "true");
              } else {
                setPassError("كلمة المرور غير صحيحة ❌");
              }
            } catch (e) { setPassError("حدث خطأ في الاتصال بالسيرفر"); }
          }

          const adminDayAll = bookings.filter(b => b.date === adminDate);
          const pendingList = adminDayAll.filter(b => b.status === "pending");
          const confirmedList = adminDayAll.filter(b => b.status === "confirmed");

          return (
            <div style={S.root}>
              <div style={S.contentWrapper}>
                <header style={S.header}>
                  <div style={S.logo}>⚽ {FIELD_NAME}</div>
                  <div style={{ fontSize: 12, color: "#64748b" }}>{view === "admin" ? "🛠️ لوحة التحكم" : "👋 أهلاً بك"}</div>
                </header>

                {toast.msg && <div style={{ ...S.toast, background: toast.type === "warn" ? "#f59e0b" : "#22c55e" }}>{toast.msg}</div>}

                {loading ? (
                  <div style={{ color: "#94a3b8", textAlign: "center", padding: "100px", fontSize: "18px", fontWeight: "bold" }}>🔄 جاري تحميل الملعب...</div>
                ) : (
                  view === "booking" ? (
                    <div style={S.page}>
                      <div style={S.hero}>
                        <h1 style={S.heroTitle}>احجز ملعبك دلوقتي</h1>
                        <p style={S.heroSub}>اختار اليوم والساعة المناسبة وابعت طلبك في ثواني</p>
                      </div>
                      <div style={S.card}>
                        <label style={S.label}>📅 اختار يوم الحجز</label>
                        <input type="date" value={selectedDate} min={todayStr()} onChange={e => setSelectedDate(e.target.value)} style={S.dateInput} />
                      </div>
                      <div style={S.legendRow}>
                        <span style={S.chip("#4ade80", "#14532d")}>🟩 متاح للحجز</span>
                        <span style={S.chip("#f87171", "#450a0a")}>🟥 محجوز أو مضى</span>
                      </div>
                      <div style={S.slotsGrid}>
                        {TIME_SLOTS.map(time => {
                          const booked = bookedSlots.has(time);
                          const past = isTimeInPast(time, selectedDate);
                          const unavailable = booked || past;
                          return (
                            <div key={time} onClick={() => !unavailable && setModal({ time })} style={{ ...S.slot, ...(unavailable ? S.slotBooked : S.slotFree) }}>
                              <span style={S.slotTime}>{time}</span>
                              <span style={S.slotLabel}>{booked ? "محجوز" : past ? "انتهى" : `${getPriceForSlot(time)} جنيه`}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : (
                    <div style={S.page}>
                      {!adminUnlocked ? (
                        <div style={S.loginCard}>
                          <h2 style={S.modalTitle}>دخول لوحة التحكم</h2>
                          <input type="password" placeholder="كلمة المرور" value={adminPass} onChange={e => setAdminPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAdminLogin()} style={S.input} />
                          {passError && <p style={S.errMsg}>{passError}</p>}
                          <button style={{ ...S.btnGreen, width: "100%", marginTop: 10 }} onClick={handleAdminLogin}>دخول</button>
                        </div>
                      ) : (
                        <>
                          <div style={S.adminTop}>
                            <h2 style={S.adminTitle}>🏟️ لوحة إدارة الحجوزات</h2>
                            <div style={S.tabs}>
                              <button style={adminTab === "pending" ? S.tabActive : S.tab} onClick={() => setAdminTab("pending")}>⏳ الانتظار ({pendingList.length})</button>
                              <button style={adminTab === "confirmed" ? S.tabActive : S.tab} onClick={() => setAdminTab("confirmed")}>✅ المؤكدة ({confirmedList.length})</button>
                            </div>
                          </div>
                          {adminTab === "pending" && pendingList.map(b => (
                            <div key={b.id} style={S.bookingCard}>
                              <div style={S.bookingTop}><span><b>{b.name}</b></span><span style={{color: '#fbbf24'}}>⏳ انتظار</span></div>
                              <div style={S.bookingMid}><span>📱 {b.phone}</span><span>⏰ {b.time} ({b.duration}س)</span><span>💰 {b.price} ج</span></div>
                            </div>
                          ))}
                          {adminTab === "confirmed" && confirmedList.map(b => (
                            <div key={b.id} style={S.bookingCard}>
                              <div style={S.bookingTop}><span><b>{b.name}</b></span><span style={{color: '#4ade80'}}>✅ مؤكد</span></div>
                              <div style={S.bookingMid}><span>📱 {b.phone}</span><span>⏰ {b.time} ({b.duration}س)</span><span>💰 {b.price} ج</span></div>
                            </div>
                          ))}
                        </>
                      )}
                    </div>
                  )
                )}
              </div>

              {modal && (
                <div style={S.overlay} onClick={() => setModal(null)}>
                  <div style={S.modalCard} onClick={e => e.stopPropagation()}>
                    <h2 style={S.modalTitle}>📋 طلب حجز جديد</h2>
                    <p style={{color: '#94a3b8', fontSize: 14, marginBottom: 15}}>ساعة البدء: {modal.time}</p>
                    
                    <div style={S.formGroup}>
                      <label style={S.label}>الاسم بالكامل</label>
                      <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} style={S.input} placeholder="مثال: محمد أحمد" />
                    </div>
                    
                    <div style={S.formGroup}>
                      <label style={S.label}>رقم الواتساب</label>
                      <input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} style={S.input} placeholder="مثال: 01xxxxxxxxx" />
                    </div>

                    <div style={S.formGroup}>
                      <label style={S.label}>⏱️ مدة الحجز (عدد الساعات)</label>
                      <select value={form.duration} onChange={e => setForm({ ...form, duration: e.target.value })} style={S.select}>
                        <option value="1">ساعة واحدة</option>
                        <option value="2">ساعتين (2 ساعة)</option>
                        <option value="3">3 ساعات</option>
                        <option value="4">4 ساعات</option>
                      </select>
                    </div>

                    <div style={{background: '#0f172a', padding: 12, borderRadius: 8, marginBottom: 15, border: '1px dashed #22c55e'}}>
                      <span style={{fontSize: 14, color: '#94a3b8'}}>الحساب الإجمالي المتوقع: </span>
                      <span style={{fontSize: 18, fontWeight: 'bold', color: '#22c55e'}}>{calculateBookingPrice(modal.time, parseInt(form.duration))} جنيه</span>
                    </div>

                    {formError && <p style={S.errMsg}>{formError}</p>}
                    
                    <div style={S.row}>
                      <button style={S.btnGray} onClick={() => setModal(null)}>إلغاء</button>
                      <button style={S.btnGreen} onClick={handleBook}>إرسال الطلب</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = RoyalRoot || ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        var RoyalRoot = root;
    </script>
</body>
</html>
