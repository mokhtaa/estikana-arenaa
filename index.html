<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - الإدارة الشاملة المؤمنة</title>
    <!-- استدعاء المكتبات الأساسية كـ Globals متوافقة مع المتصفح -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <!-- استدعاء ملف الـ Script بشكل خارجي وتمرير متغير عشوائي لإجبار المتصفح على كسر الكاش -->
    <script type="text/babel">
        const script = document.createElement('script');
        script.type = 'text/babel';
        script.src = './app.js?v=' + Math.random();
        document.body.appendChild(script);
    </script>
</body>
</html>
