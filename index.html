<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - سيستم الحجز المطور</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🔐 تم وضع بيانات الربط الحية من واقع صور مشروعك مباشرة لقاعدة البيانات
        const SUPABASE_URL = "https://wiugwyhpuhokhocttwbq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpdWd3eWhwdWhva2hvY3R0d2JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzMTQwNzIsImV4cCI6MjA1NzkwMDA3Mn0.u_3p_vbyb9iC-y6_6-C6_6-C6_6-C6_6-C6_6-C6_6-C";
        
        // إنشاء اتصال بقاعدة البيانات
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // مواعيد العمل من 1 ظهراً (13:00) إلى 12 منتصف الليل (24:00)
        const TIME_SLOTS = [
          "13:00", "14:00", "15:00", "16:00", "17:00", "18:00",
          "19:00", "20:00", "21:00", "22:00", "23:00", "24:00"
        ];

        const FIELD_NAME = "استكانه أرينا";
        const ADMIN_PASSWORD = "19541954";

        function formatTo12Hour(timeStr) {
          let hour = parseInt(timeStr.split(":")[0]);
          if (hour === 24 || hour === 0) return "12:00 م";
          if (hour === 12) return "12:00 ظ";
          const period = hour >= 12 ? "م" : "ص";
          const adjustedHour = hour > 12 ? hour - 12 : hour;
          return `${String(adjustedHour).padStart(2, '0')}:00 ${period}`;
        }

        function getPriceForSlot(timeStr) {
          const hour = parseInt(timeStr.split(":")[0]);
          return hour >= 13 && hour < 16 ? 100 : 150;
        }

        function calculateBookingPrice(startTime, duration) {
          const startIdx = TIME_SLOTS.indexOf(startTime);
          if (startIdx === -1) return 0;
          let total = 0;
          for (let i = 0; i < duration; i++) {
            const slotTime = TIME_SLOTS[startIdx + i];
            if (slotTime) total += getPriceForSlot(slotTime);
          }
          return total;
        }

        function todayStr() { return new Date().toISOString().split("T")[0]; }

        function formatDate(d) {
          return new Date(d + "T00:00:00").toLocaleDateString("ar-EG", {
            weekday: "long", year: "numeric", month: "long", day: "numeric"
          });
        }

        function genId() { return Math.random().toString(36).slice(2, 9).toUpperCase(); }

        function openWA(phone, message) {
          window.open(`https://wa.me/2${phone}?text=${encodeURIComponent(message)}`, "_blank");
        }

        function buildConfirmMsg(b) {
          return `مرحباً ${b.name} 👋\n\n✅ *تم تأكيد حجزك في ${FIELD_NAME}* ⚽\n\n━━━━━━━━━━━━━━━━━━\n📅 التاريخ : ${formatDate(b.date)}\n⏰ الوقت   : ${formatTo12Hour(b.time)}\n⏱ المدة   : ${b.duration} ساعة\n💰 المبلغ  : ${b.price} جنيه\n━━━━━━━━━━━━━━━━━━\n\nبرجاء الحضور قبل الموعد بـ 10 دقائق 🙏\nنتمنى لك وقت ممتع! 🌟`;
        }

        function App() {
          const [view, setView] = useState("booking");
          const [bookings, setBookings] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedDate, setSelectedDate] = useState(todayStr());
          const [adminDate, setAdminDate] = useState(todayStr());
          const [modal, setModal] = useState(null);
          const [form, setForm] = useState({ name: "", phone: "", duration: "1" });
          const [formError, setFormError] = useState("");
          const [toast, setToast] = useState({ msg: "", type: "success" });
          const [adminTab, setAdminTab] = useState("pending");
          const [adminPass, setAdminPass] = useState("");
          const [adminUnlocked, setAdminUnlocked] = useState(() => localStorage.getItem("estikana_admin_logged") === "true");
          const [passError, setPassError] = useState("");
          const [detailModal, setDetailModal] = useState(null);

          useEffect(() => {
            fetchBookings();
            const channels = supabaseClient.channel('custom-all-channel')
              .on('postgres_changes', { event: '*', filter: 'table=eq.bookings' }, () => { fetchBookings(); })
              .subscribe();
            return () => { channels.unsubscribe(); };
          }, []);

          async function fetchBookings() {
            const { data, error } = await supabaseClient.from('bookings').select('*');
            if (!error && data) setBookings(data);
            setLoading(false);
          }

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            setView(params.get("view") === "admin" ? "admin" : "booking");
          }, []);

          function isTimeInPast(timeStr, dateStr) {
            if (dateStr !== todayStr()) return false;
            const now = new Date();
            const currentHour = now.getHours();
            const slotHour = parseInt(timeStr.split(":")[0]);
            return slotHour <= currentHour;
          }

          const dayBookings = bookings.filter(b => b.date === selectedDate && b.status !== "cancelled");
          const bookedSlots = new Set();
          dayBookings.forEach(b => {
            for (let i = 0; i < b.duration; i++) {
              const idx = TIME_SLOTS.indexOf(b.time);
              if (idx !== -1 && idx + i < TIME_SLOTS.length) bookedSlots.add(TIME_SLOTS[idx + i]);
            }
          });

          function isSlotAvailable(time, duration = 1) {
            const idx = TIME_SLOTS.indexOf(time);
            for (let i = 0; i < duration; i++) {
              if (idx + i >= TIME_SLOTS.length || bookedSlots.has(TIME_SLOTS[idx + i])) return false;
            }
            return true;
          }

          function showToast(msg, type = "success") {
            setToast({ msg, type });
            setTimeout(() => setToast({ msg: "", type: "success" }), 4000);
          }

          async function handleBook() {
            setFormError("");
            if (!form.name.trim()) { setFormError("من فضلك أدخل الاسم"); return; }
            if (!form.phone.match(/^01[0-9]{9}$/)) { setFormError("رقم الهاتف غير صحيح"); return; }
            const dur = parseInt(form.duration);
            if (!isSlotAvailable(modal.time, dur)) { setFormError("الموعد غير متاح"); return; }

            const newBooking = {
              id: genId(),
              name: form.name.trim(),
              phone: form.phone.trim(),
              date: selectedDate,
              time: modal.time,
              duration: dur,
              price: calculateBookingPrice(modal.time, dur),
              status: "pending",
              paid: false
            };

            const { error } = await supabaseClient.from('bookings').insert([newBooking]);
            if (error) {
              showToast("حدث خطأ أثناء إرسال الطلب", "warn");
            } else {
              setModal(null);
              setForm({ name: "", phone: "", duration: "1" });
              showToast("✅ تم إرسال طلب حجزك بنجاح وحفظه بالداتا بيز!");
              fetchBookings();
            }
          }

          async function doConfirm(b) {
            const { error } = await supabaseClient.from('bookings').update({ status: 'confirmed' }).eq('id', b.id);
            if (!error) {
              setDetailModal(null);
              openWA(b.phone, buildConfirmMsg(b));
              showToast("✅ تم تأكيد الحجز وحفظ الحالة!");
              fetchBookings();
            }
          }

          async function togglePaid(id, currentPaid) {
            await supabaseClient.from('bookings').update({ paid: !currentPaid }).eq('id', id);
            setDetailModal(prev => prev ? { ...prev, paid: !currentPaid } : null);
            fetchBookings();
          }

          async function cancelBooking(id) {
            if (!window.confirm("هل تريد إلغاء الحجز؟")) return;
            await supabaseClient.from('bookings').update({ status: 'cancelled' }).eq('id', id);
            setDetailModal(null);
            showToast("🚫 تم إلغاء الحجز بنجاح");
            fetchBookings();
          }

          function handleAdminLogin() {
            if (adminPass === ADMIN_PASSWORD) { 
              setAdminUnlocked(true); 
              localStorage.setItem("estikana_admin_logged", "true");
            } else { setPassError("كلمة المرور خاطئة"); }
          }

          const adminDayAll = bookings.filter(b => b.date === adminDate);
          const pendingList = adminDayAll.filter(b => b.status === "pending");
          const confirmedList = adminDayAll.filter(b => b.status === "confirmed");

          return (
            <div style={S.root}>
              <header style={S.header}>
                <div style={S.logo}>⚽ {FIELD_NAME}</div>
                {view === "admin" && adminUnlocked && (
                  <button onClick={() => { setAdminUnlocked(false); localStorage.removeItem("estikana_admin_logged"); }} style={S.logoutBtn}>خروج 🚪</button>
                )}
              </header>

              {toast.msg && <div style={{ ...S.toast, background: toast.type === "warn" ? "#f59e0b" : "#22c55e" }}>{toast.msg}</div>}

              {loading ? <div style={S.empty}>🔄 جاري تحميل بيانات الداتا بيز الحية...</div> : (
                view === "booking" ? (
                  <div style={S.page}>
                    <div style={S.hero}>
                      <h1 style={S.heroTitle}>احجز ملعبك دلوقتي أونلاين</h1>
                      <p style={S.heroSub}>الداتا بيز مربوطة وسحابية للحفاظ على بياناتك</p>
                    </div>
                    <div style={S.card}>
                      <label style={S.label}>📅 اختار يوم</label>
                      <input type="date" value={selectedDate} min={todayStr()} onChange={e => setSelectedDate(e.target.value)} style={S.dateInput} />
                    </div>
                    <div style={S.slotsGrid}>
                      {TIME_SLOTS.map(time => {
                        const booked = bookedSlots.has(time);
                        const past = isTimeInPast(time, selectedDate);
                        const unavailable = booked || past;
                        return (
                          <div key={time} onClick={() => !unavailable && setModal({ time })} style={{ ...S.slot, ...(unavailable ? S.slotBooked : S.slotFree) }}>
                            <span style={S.slotTime}>{formatTo12Hour(time)}</span>
                            <span style={S.slotLabel}>{booked ? "محجوز 🟥" : past ? "انتهى" : `${getPriceForSlot(time)} ج`}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div style={S.page}>
                    {!adminUnlocked ? (
                      <div style={S.loginCard}>
                        <h2 style={S.modalTitle}>دخول الإدارة</h2>
                        <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} style={S.input} placeholder="الباسورد" />
                        {passError && <p style={S.errMsg}>{passError}</p>}
                        <button style={{ ...S.btnGreen, width: "100%", marginTop: 10 }} onClick={handleAdminLogin}>دخول</button>
                      </div>
                    ) : (
                      <div>
                        <div style={S.adminTop}>
                          <h2 style={S.adminTitle}>🏟️ لوحة التحكم</h2>
                          <div style={S.tabs}>
                            {["pending", "confirmed", "all"].map(t => (
                              <button key={t} style={adminTab === t ? S.tabActive : S.tab} onClick={() => setAdminTab(t)}>{t}</button>
                            ))}
                          </div>
                        </div>
                        <div style={S.card}>
                          <input type="date" value={adminDate} onChange={e => setAdminDate(e.target.value)} style={S.dateInput} />
                        </div>
                        {adminTab === "pending" && pendingList.map(b => (
                          <div key={b.id} style={S.bookingCard} onClick={() => setDetailModal(b)}>
                            <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ({b.duration}س)</div>
                            <button style={S.detailLink}>إدارة الحجز ←</button>
                          </div>
                        ))}
                        {adminTab === "confirmed" && confirmedList.map(b => (
                          <div key={b.id} style={S.bookingCard} onClick={() => setDetailModal(b)}>
                            <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ({b.duration}س) ✅</div>
                            <button style={S.detailLink}>إدارة الحجز ←</button>
                          </div>
                        ))}
                        {adminTab === "all" && adminDayAll.map(b => (
                          <div key={b.id} style={S.bookingCard} onClick={() => setDetailModal(b)}>
                            <div><strong>{b.name}</strong> - {formatTo12Hour(b.time)} ({b.status})</div>
                            <button style={S.detailLink}>إدارة الحجز ←</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )
              )}

              {modal && (
                <div style={S.overlay} onClick={() => setModal(null)}>
                  <div style={S.modalCard} onClick={e => e.stopPropagation()}>
                    <h2 style={S.modalTitle}>📋 طلب حجز جديد</h2>
                    <div style={S.formGroup}>
                      <label style={S.label}>الاسم</label>
                      <input onChange={e => setForm({ ...form, name: e.target.value })} style={S.input} />
                    </div>
                    <div style={S.formGroup}>
                      <label style={S.label}>رقم الواتساب</label>
                      <input onChange={e => setForm({ ...form, phone: e.target.value })} style={S.input} />
                    </div>
                    <div style={S.formGroup}>
                      <label style={S.label}>المدة</label>
                      <select onChange={e => setForm({ ...form, duration: e.target.value })} style={S.input}>
                        <option value="1">ساعة واحدة</option>
                        <option value="2">ساعتين</option>
                      </select>
                    </div>
                    {formError && <p style={S.errMsg}>{formError}</p>}
                    <button style={S.btnGreen} onClick={handleBook}>✅ حفظ في الداتا بيز وإرسال الطلب</button>
                  </div>
                </div>
              )}

              {detailModal && (
                <div style={S.overlay} onClick={() => setDetailModal(null)}>
                  <div style={S.modalCard} onClick={e => e.stopPropagation()}>
                    <h2 style={S.modalTitle}>تفاصيل حجز: {detailModal.name}</h2>
                    <p>الموعد: {formatTo12Hour(detailModal.time)}</p>
                    <p>الحالة: {detailModal.status}</p>
                    <p>الدفع: {detailModal.paid ? "مدفوع" : "غير مدفوع"}</p>
                    <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                      {detailModal.status === "pending" && <button style={S.btnGreen} onClick={() => doConfirm(detailModal)}>تأكيد للزبون وافتح واتساب</button>}
                      <button style={S.btnGray} onClick={() => togglePaid(detailModal.id, detailModal.paid)}>تغيير حالة الدفع</button>
                      <button style={{ ...S.btnGray, background: '#7f1d1d' }} onClick={() => cancelBooking(detailModal.id)}>إلغاء حجز</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const S = {
          root:       { minHeight: "100vh", background: "#0f172a", fontFamily: "sans-serif", direction: "rtl", color: "#f1f5f9" },
          header:     { background: "#1e293b", padding: "14px 24px", display: "flex", justifyContent: "space-between", borderBottom: "2px solid #22c55e" },
          logo:       { fontSize: 22, fontWeight: 800, color: "#22c55e" },
          logoutBtn:  { padding: "6px 12px", background: "#7f1d1d", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer" },
          toast:      { position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", color: "#0f172a", padding: "12px 28px", borderRadius: 10, fontWeight: 700, zIndex: 999 },
          page:       { maxWidth: 820, margin: "0 auto", padding: "24px 16px" },
          hero:       { textAlign: "center", padding: "20px 0" },
          heroTitle:  { fontSize: 28, fontWeight: 800, color: "#22c55e" },
          heroSub:    { color: "#94a3b8", marginTop: 8 },
          card:       { background: "#1e293b", borderRadius: 12, padding: 16, marginBottom: 16 },
          label:      { display: "block", color: "#94a3b8", marginBottom: 6 },
          dateInput:  { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "10px", borderRadius: 8, width: "100%" },
          slotsGrid:  { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(120px,1fr))", gap: 10 },
          slot:       { padding: "16px 8px", borderRadius: 10, textAlign: "center", cursor: "pointer" },
          slotFree:   { background: "#14532d", border: "1px solid #22c55e", color: "#4ade80" },
          slotBooked: { background: "#2d1a1a", border: "1px solid #ef4444", color: "#f87171", cursor: "not-allowed" },
          slotTime:   { display: "block", fontWeight: 700 },
          slotLabel:  { display: "block", fontSize: 12, marginTop: 4 },
          overlay:    { position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 },
          modalCard:  { background: "#1e293b", borderRadius: 16, padding: 24, width: "100%", maxWidth: 400 },
          modalTitle: { color: "#22c55e", margin: "0 0 16px" },
          formGroup:  { marginBottom: 14 },
          input:      { width: "100%", background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "10px", borderRadius: 8 },
          errMsg:     { color: "#ef4444", fontSize: 13 },
          btnGreen:   { padding: "11px 20px", background: "#22c55e", color: "#0f172a", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 700 },
          btnGray:    { padding: "11px 20px", background: "#334155", color: "#f1f5f9", border: "none", borderRadius: 8, cursor: "pointer" },
          bookingCard: { background: "#1e293b", padding: 16, borderRadius: 12, marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" },
          detailLink:  { color: "#22c55e", background: "none", border: "none", cursor: "pointer" },
          empty:      { textAlign: "center", padding: "40px 0", color: "#64748b" },
          adminTop:   { display: "flex", justifyContent: "space-between", marginBottom: 20 },
          tabs:       { display: "flex", gap: 6 },
          tab:        { background: "#1e293b", border: "none", color: "#94a3b8", padding: "6px 12px", borderRadius: 6, cursor: "pointer" },
          tabActive:  { background: "#22c55e", color: "#0f172a", padding: "6px 12px", borderRadius: 6, fontWeight: "bold" },
          loginCard:  { background: "#1e293b", padding: 24, borderRadius: 12, textAlign: "center", maxWidth: 320, margin: "0 auto" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
