<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - لوحة التحكم المتقدمة</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a !important;
            font-family: system-ui, -apple-system, sans-serif;
            direction: rtl;
            color: #f1f5f9;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        /** @jsx React.createElement */
        const useState = React.useState;
        const useEffect = React.useEffect;

        const SUPABASE_URL = "https://wiugwyhpuhokhocttwbq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_zzDhn9DNIAdjJLn8aNzKzA_4IapbzcL";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TIME_SLOTS = [
          "1:00 ظهراً", "2:00 ظهراً", "3:00 عصراً", "4:00 عصراً", 
          "5:00 مساءً", "6:00 مساءً", "7:00 مساءً", "8:00 مساءً", 
          "9:00 مساءً", "10:00 مساءً", "11:00 مساءً", "12:00 مساءً"
        ];

        function parseTo24Hour(timeStr) {
          if (!timeStr || typeof timeStr !== 'string' || !timeStr.includes(':')) return 0;
          try {
            const hour = parseInt(timeStr.split(":")[0]);
            if (!timeStr.includes("ظهراً") && !timeStr.includes("عصراً") && !timeStr.includes("مساءً")) return hour;
            if (timeStr.includes("ظهراً") || timeStr.includes("عصراً")) return hour === 12 ? 12 : hour + 12; 
            if (timeStr.includes("مساءً")) return hour === 12 ? 24 : hour + 12;
            return hour;
          } catch (e) { return 0; }
        }

        function todayStr() { return new Date().toISOString().split("T")[0]; }
        function currentMonthStr() { return new Date().toISOString().substring(0, 7); }

        const S = {
          root: { minHeight: "100vh", background: "#0f172a", display: "flex", flexDirection: "column" },
          header: { background: "#111827", padding: "14px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "2px solid #22c55e" },
          logoText: { fontSize: 20, fontWeight: "bold", color: "#22c55e" },
          page: { maxWidth: "1000px", margin: "0 auto", padding: "24px 16px", width: "100%", boxSizing: "border-box", flex: 1 },
          
          statsGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "16px", marginBottom: "24px" },
          statCard: (borderColor) => ({ background: "#1e293b", borderRadius: "12px", padding: "16px", borderRight: `5px solid ${borderColor}` }),
          
          adminRow: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px", flexWrap: "wrap", gap: "12px" },
          tabs: { display: "flex", gap: "8px", flexWrap: "wrap" },
          tabBtn: (active) => ({
            background: active ? "#22c55e" : "#1e293b", color: active ? "#0f172a" : "#9ca3af",
            border: active ? "1px solid #22c55e" : "1px solid #334155", padding: "8px 16px", borderRadius: "8px", cursor: "pointer", fontWeight: "bold"
          }),
          
          bookingCard: { background: "#151f32", borderRadius: "8px", padding: "18px", marginBottom: "12px", border: "1px solid #1e293b" },
          bookingHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" },
          bookingDetails: { display: "flex", gap: "20px", color: "#9ca3af", fontSize: 15, flexWrap: "wrap", marginBottom: "12px" },
          actionRow: { display: "flex", gap: "8px", justifyContent: "flex-end", flexWrap: "wrap", marginTop: "12px" },
          actionBtn: (bg, color) => ({ background: bg, color: color, border: "none", padding: "8px 16px", borderRadius: "6px", cursor: "pointer", fontWeight: "bold", fontSize: "14px" }),
          
          card: { background: "#1e293b", borderRadius: "12px", padding: "16px", marginBottom: "16px", border: "1px solid #334155" },
          dateInput: { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "12px", borderRadius: 8, width: "100%", fontSize: 16, boxSizing: "border-box" },
          select: { background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "10px 14px", borderRadius: 8, fontSize: 15, colorScheme: "dark", cursor: "pointer" },
          slotsGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(120px,1fr))", gap: 12 },
          slotFree: { background: "#14532d", border: "1px solid #22c55e", color: "#4ade80", padding: "16px 8px", borderRadius: 12, textAlign: "center", cursor: "pointer" },
          slotBooked: { background: "#2d1a1a", border: "1px solid #ef4444", color: "#f87171", padding: "16px 8px", borderRadius: 12, textAlign: "center", opacity: 0.8 },
          slotDisabled: { background: "#334155", border: "1px solid #475569", color: "#94a3b8", padding: "16px 8px", borderRadius: 12, textAlign: "center", opacity: 0.6, cursor: "not-allowed" },
          toast: { position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", color: "#fff", padding: "12px 28px", borderRadius: 10, zIndex: 999, fontWeight: 'bold' },
          footer: { background: "#111827", padding: "16px", textAlign: "center", borderTop: "1px solid #1e293b", color: "#94a3b8", fontSize: "14px", marginTop: "auto" },
          label: { display: "block", marginBottom: "8px", color: "#94a3b8", fontSize: "14px" },

          modalOverlay: { position: "fixed", inset: 0, background: "rgba(15, 23, 42, 0.85)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: "16px" },
          modalCard: { background: "#1e293b", borderRadius: "16px", padding: "24px", width: "100%", maxWidth: "400px", border: "1px solid #334155", boxShadow: "0 20px 25px -5px rgba(0, 0, 0, 0.5)", boxSizing: "border-box" },
          modalTitle: { margin: "0 0 20px 0", fontSize: "20px", fontWeight: "bold", color: "#22c55e", textAlign: "center" },
          modalInput: { width: "100%", background: "#0f172a", border: "1px solid #334155", color: "#f1f5f9", padding: "12px 16px", borderRadius: "8px", fontSize: "15px", marginBottom: "16px", boxSizing: "border-box", outline: "none" },
          modalBtn: { width: "100%", background: "#22c55e", color: "#0f172a", border: "none", padding: "12px", borderRadius: "8px", fontWeight: "bold", fontSize: "16px", cursor: "pointer", marginTop: "8px" }
        };

        function App() {
          const [view, setView] = useState("booking"); 
          const [isAuthorized, setIsAuthorized] = useState(false);
          const [passwordInput, setPasswordInput] = useState("");
          const [loginError, setLoginError] = useState("");
          
          const [bookings, setBookings] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedDate, setSelectedDate] = useState(todayStr());
          const [modal, setModal] = useState(null);
          const [form, setForm] = useState({ name: "", phone: "", duration: "1" });
          const [formError, setFormError] = useState("");
          const [toast, setToast] = useState({ msg: "", type: "success" });
          const [adminTab, setAdminTab] = useState("pending");
          const [isSubmitting, setIsSubmitting] = useState(false);
          const [selectedMonth, setSelectedMonth] = useState(currentMonthStr());
          const [displayedReport, setDisplayedReport] = useState({ month: currentMonthStr(), total: 0 });

          // داتا الإعدادات الديناميكية من الداتابيز
          const [pricingConfig, setPricingConfig] = useState({ afternoon: 100, evening: 150 });
          const [disabledSlots, setDisabledSlots] = useState([]); // تخزن المواعيد المغلقة مثل: ["2026-06-20|3:00 عصراً", "2026-06-21|ALL"]

          useEffect(() => {
            fetchBookings();
            fetchAdminConfigs();
            const channels = supabaseClient.channel('realtime-bookings')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, () => { fetchBookings(); })
              .subscribe();
            
            if (sessionStorage.getItem("admin_logged") === "true") {
              setIsAuthorized(true);
            }

            return () => { channels.unsubscribe(); };
          }, []);

          useEffect(() => {
            if (bookings.length > 0) generateMonthlyReport();
          }, [bookings, selectedMonth]);

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get("view") === "admin") {
              setView("admin");
            } else {
              setView("booking");
            }
          }, []);

          async function fetchBookings() {
            try {
              const { data, error } = await supabaseClient.from('bookings').select('*');
              if (!error && data) setBookings(data);
            } catch (e) { console.error(e); }
            setLoading(false);
          }

          // جلب أسعار ومواعيد الإغلاق من جدول الأدمين
          async function fetchAdminConfigs() {
            try {
              const { data, error } = await supabaseClient.from('admin_config').select('*');
              if (!error && data) {
                const pricing = data.find(c => c.key === 'pricing_config');
                const disabled = data.find(c => c.key === 'disabled_slots');
                if (pricing) setPricingConfig(JSON.parse(pricing.value));
                if (disabled) setDisabledSlots(JSON.parse(disabled.value));
              }
            } catch (e) { console.error("Error fetching configs:", e); }
          }

          function getPriceForSlot(timeStr) {
            const hour24 = parseTo24Hour(timeStr);
            return hour24 >= 13 && hour24 <= 18 ? pricingConfig.afternoon : pricingConfig.evening;
          }

          function calculateBookingPrice(startTime, duration) {
            const startIdx = TIME_SLOTS.indexOf(startTime);
            if (startIdx === -1) return 0;
            let total = 0;
            for (let i = 0; i < duration; i++) {
              const slotTime = TIME_SLOTS[startIdx + i];
              if (slotTime) total += getPriceForSlot(slotTime);
            }
            return total;
          }

          async function handleLogin(e) {
            e.preventDefault();
            setLoginError("");
            try {
              const { data, error } = await supabaseClient
                .from('admin_config')
                .select('value')
                .eq('key', 'admin_password')
                .single();
              
              if (!error && data && data.value === passwordInput) {
                setIsAuthorized(true);
                sessionStorage.setItem("admin_logged", "true");
                showToast("🔓 أهلاً بك يا كابتن! تم تسجيل الدخول بنجاح.");
              } else {
                setLoginError("❌ كلمة المرور غير صحيحة!");
              }
            } catch (err) {
              setLoginError("خطأ في الاتصال بقاعدة البيانات.");
            }
          }

          function handleLogout() {
            setIsAuthorized(false);
            sessionStorage.removeItem("admin_logged");
            window.location.search = "?view=booking";
          }

          function showToast(msg, type = "success") {
            setToast({ msg, type });
            setTimeout(() => setToast({ msg: "", type: "success" }), 4000);
          }

          // حفظ تعديلات الإغلاق أو الأسعار في السوبابيز
          async function saveConfigToDatabase(key, valueObj) {
            const { error } = await supabaseClient
              .from('admin_config')
              .update({ value: JSON.stringify(valueObj) })
              .eq('key', key);
            if (!error) {
              showToast("💾 تم حفظ الإعدادات وتحديث الموقع فوراً!");
              fetchAdminConfigs();
            } else {
              showToast("❌ فشل حفظ الإعدادات", "warn");
            }
          }

          // قفل أو فتح ساعة معينة
          function toggleSlotDisable(date, time) {
            const targetKey = `${date}|${time}`;
            let updated = [...disabledSlots];
            if (updated.includes(targetKey)) {
              updated = updated.filter(x => x !== targetKey);
            } else {
              updated.push(targetKey);
            }
            setDisabledSlots(updated);
            saveConfigToDatabase('disabled_slots', updated);
          }

          // قفل أو فتح يوم بالكامل
          function toggleDayDisable(date) {
            const targetKey = `${date}|ALL`;
            let updated = [...disabledSlots];
            if (updated.includes(targetKey)) {
              updated = updated.filter(x => x !== targetKey);
            } else {
              // مسح أي ساعات فردية مقفولة في نفس اليوم منعاً للتكرار وضف قفل اليوم كامل
              updated = updated.filter(x => !x.startsWith(date));
              updated.push(targetKey);
            }
            setDisabledSlots(updated);
            saveConfigToDatabase('disabled_slots', updated);
          }

         async function handleBook() {
            setFormError("");
            if (!form.name.trim()) { setFormError("الاسم مطلوب"); return; }
            if (!form.phone.match(/^01[0-9]{9}$/)) { setFormError("رقم الهاتف غير صحيح"); return; }
            
            // إضافة سطر القفل هنا
            setIsSubmitting(true); 
            
            const dur = parseInt(form.duration);
            const calculatedPrice = calculateBookingPrice(modal.time, dur);

            const newBooking = {
              id: Math.random().toString(36).slice(2, 9).toUpperCase(), name: form.name.trim(), phone: form.phone.trim(),
              date: selectedDate, time: modal.time, duration: dur,
              price: calculatedPrice, status: "pending", paid: false
            };

            const { error } = await supabaseClient.from('bookings').insert([newBooking]);
            
            // فتح الزرار تاني بعد ما العملية تخلص
            setIsSubmitting(false); 
            
            if (error) { showToast("حدث خطأ في الشبكة", "warn"); } 
            else {
              setModal(null); setForm({ name: "", phone: "", duration: "1" });
              showToast("✅ تم إرسال طلب الحجز بنجاح!");
              fetchBookings();
            }
          }

          async function updateStatus(booking, newStatus) {
            const { error } = await supabaseClient.from('bookings').update({ status: newStatus }).eq('id', booking.id);
            if (error) {
              showToast("فشل تحديث الحالة", "warn");
            } else {
              showToast(newStatus === "confirmed" ? "🎉 تم تأكيد الحجز" : "❌ تم الإلغاء");
              if (newStatus === "confirmed") {
                const message = `أهلاً بك كابتن ${booking.name} 🏟️ من ملعب استكانه أرينا، تم تأكيد حجزك بنجاح.\n📅 التاريخ: ${booking.date}\n⏰ الساعة: ${booking.time}\n⏱️ المدة: ${booking.duration} ساعة\n💰 الحساب الإجمالي: ${booking.price} جنيه\nتنورنا في أي وقت! ⚽`;
                const whatsappUrl = `https://wa.me/2${booking.phone}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');
              }
              fetchBookings();
            }
          }

          async function togglePaid(id, currentPaidStatus) {
            const { error } = await supabaseClient.from('bookings').update({ paid: !currentPaidStatus }).eq('id', id);
            if (!error) {
              showToast("🔄 تم تحديث حالة الدفع");
              fetchBookings();
            }
          }

          const dayBookings = bookings.filter(b => b.date === selectedDate && b.status !== "cancelled");
          const bookedSlots = new Set();
          dayBookings.forEach(b => {
            const dur = parseInt(b.duration || 1);
            for (let i = 0; i < dur; i++) {
              const idx = TIME_SLOTS.indexOf(b.time);
              if (idx !== -1 && idx + i < TIME_SLOTS.length) bookedSlots.add(TIME_SLOTS[idx + i]);
            }
          });

          const availableMonths = Array.from(new Set(bookings.filter(b => b.status === "confirmed" && b.date).map(b => b.date.substring(0, 7))));
          if (!availableMonths.includes(currentMonthStr())) availableMonths.push(currentMonthStr());
          availableMonths.sort().reverse();

          function generateMonthlyReport() {
            const confirmedInMonth = bookings.filter(b => b.status === "confirmed" && b.date && b.date.substring(0, 7) === selectedMonth);
            const total = confirmedInMonth.reduce((sum, b) => sum + Number(b.price || 0), 0);
            setDisplayedReport({ month: selectedMonth, total: total });
          }

          const pendingList = bookings.filter(b => b.status === "pending");
          const confirmedList = bookings.filter(b => b.status === "confirmed");

          const totalRevenue = confirmedList.reduce((sum, b) => sum + Number(b.price || 0), 0);
          const paidRevenue = confirmedList.filter(b => b.paid).reduce((sum, b) => sum + Number(b.price || 0), 0);
          const pendingRevenue = pendingList.reduce((sum, b) => sum + Number(b.price || 0), 0);

          // فحص هل اليوم الحالي مقفول تماماً
          const isDayDisabled = disabledSlots.includes(`${selectedDate}|ALL`);

          return (
            <div style={S.root}>
              <header style={S.header}>
                <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
                  <span style={S.logoText}>استكانه أرينا</span><span>⚽</span>
                </div>
                <div style={{display: 'flex', gap: '15px'}}>
                  <a href="?view=booking" style={{color: '#22c55e', textDecoration:'none', fontWeight:'bold'}}>صفحة الحجز الرئيسي</a>
                  {isAuthorized && <button onClick={handleLogout} style={{background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontWeight:'bold', fontSize:'14px'}}>تسجيل الخروج 🚪</button>}
                </div>
              </header>

              {toast.msg && <div style={{ ...S.toast, background: toast.type === "warn" ? "#ef4444" : "#22c55e" }}>{toast.msg}</div>}

              {loading ? (
                <div style={{ color: "#94a3b8", textAlign: "center", padding: "100px", fontWeight: "bold" }}>🔄 جاري الاتصال بالخادم...</div>
              ) : (
                view === "booking" ? (
                  <div style={S.page}>
                    <div style={{ textAlign: "center", padding: "20px 0" }}>
                      <h1 style={{ fontSize: 32, fontWeight: 800, color: "#22c55e", margin: 0 }}>احجز ملعبك دلوقتي</h1>
                    </div>
                    <div style={S.card}>
                      <label style={S.label}>📅 اختار يوم الحجز</label>
                      <input type="date" value={selectedDate} min={todayStr()} onChange={e => setSelectedDate(e.target.value)} style={S.dateInput} />
                    </div>

                    {isDayDisabled ? (
                      <div style={{background: '#2d1a1a', border: '1px solid #ef4444', color: '#f87171', padding: '30px', borderRadius: '12px', textAlign: 'center', fontWeight: 'bold', fontSize: '18px'}}>
                        🔒 نعتذر منك، الملعب مغلق بالكامل في هذا اليوم بأمر من الإدارة.
                      </div>
                    ) : (
                      <div style={S.slotsGrid}>
                        {TIME_SLOTS.map(time => {
                          const isBooked = bookedSlots.has(time);
                          const isSlotDisabled = disabledSlots.includes(`${selectedDate}|${time}`);
                          const slotPrice = getPriceForSlot(time);
                          
                          if (isSlotDisabled) {
                            return (
                              <div key={time} style={S.slotDisabled}>
                                <span style={{ fontWeight: "bold" }}>{time}</span>
                                <span style={{display:'block', fontSize:12, marginTop: 4}}>مغلق 🔒</span>
                              </div>
                            );
                          }

                          return (
                            <div key={time} onClick={() => !isBooked && setModal({ time })} style={isBooked ? S.slotBooked : S.slotFree}>
                              <span style={{ fontWeight: "bold" }}>{time}</span>
                              <span style={{display:'block', fontSize:12, marginTop: 4, opacity: 0.9}}>
                                {isBooked ? "محجوز 🚫" : `${slotPrice} جنيه 💰`}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ) : (
                  !isAuthorized ? (
                    <div style={{...S.page, maxWidth: '400px', marginTop: '60px'}}>
                      <div style={S.card}>
                        <h2 style={{color: '#22c55e', marginTop: 0, textAlign:'center'}}>🔐 تسجيل دخول الإدارة</h2>
                        <form onSubmit={handleLogin}>
                          <div style={{marginBottom: 16}}>
                            <label style={S.label}>أدخل كلمة مرور المسؤول:</label>
                            <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} style={S.dateInput} placeholder="••••••••" required />
                          </div>
                          {loginError && <p style={{color:'#ef4444', fontSize:14, fontWeight:'bold'}}>{loginError}</p>}
                          <button type="submit" style={{width:'100%', background:'#22c55e', color:'#0f172a', border:'none', padding:'12px', borderRadius:'8px', fontWeight:'bold', cursor:'pointer'}}>دخول اللوحة ➔</button>
                        </form>
                      </div>
                    </div>
                  ) : (
                    <div style={S.page}>
                      {/* لوحة المؤشرات المالية */}
                      <div style={S.statsGrid}>
                        <div style={S.statCard("#22c55e")}>
                          <span style={{color: '#94a3b8', fontSize: '13px', display:'block'}}>إجمالي الإيرادات المؤكدة</span>
                          <span style={{fontSize: '24px', fontWeight: 'bold', color: '#fff'}}>{totalRevenue} ج</span>
                        </div>
                        <div style={S.statCard("#3b82f6")}>
                          <span style={{color: '#94a3b8', fontSize: '13px', display:'block'}}>إيراد مضمون (مدفوع)</span>
                          <span style={{fontSize: '24px', fontWeight: 'bold', color: '#3b82f6'}}>{paidRevenue} ج</span>
                        </div>
                        <div style={S.statCard("#fbbf24")}>
                          <span style={{color: '#94a3b8', fontSize: '13px', display:'block'}}>إيراد معلق (قيد الانتظار)</span>
                          <span style={{fontSize: '24px', fontWeight: 'bold', color: '#fbbf24'}}>{pendingRevenue} ج</span>
                        </div>
                      </div>

                      {/* 🛠️ قسم التحكم الجديد والمطور: الأسعار والمواعيد */}
                      <div style={{...S.card, background: '#111827', border: '1px solid #fbbf24', padding: '20px', marginBottom: '24px'}}>
                        <h3 style={{margin: '0 0 16px 0', color: '#fbbf24', fontSize: '18px'}}>⚙️ لوحة التحكم في المواعيد والأسعار الحالية</h3>
                        
                        {/* أ) التحكم في الأسعار */}
                        <div style={{display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: '20px', borderBottom: '1px solid #1e293b', paddingBottom: '20px'}}>
                          <div style={{flex: 1, minWidth: '150px'}}>
                            <label style={S.label}>💰 سعر الفترة الصباحية (1 ظهراً - 6 مساءً):</label>
                            <input type="number" value={pricingConfig.afternoon} onChange={e => setPricingConfig({...pricingConfig, afternoon: Number(e.target.value)})} style={S.dateInput} />
                          </div>
                          <div style={{flex: 1, minWidth: '150px'}}>
                            <label style={S.label}>💰 سعر الفترة المسائية (7 مساءً - 12 ليلاً):</label>
                            <input type="number" value={pricingConfig.evening} onChange={e => setPricingConfig({...pricingConfig, evening: Number(e.target.value)})} style={S.dateInput} />
                          </div>
                          <div style={{display: 'flex', alignItems: 'flex-end'}}>
                            <button onClick={() => saveConfigToDatabase('pricing_config', pricingConfig)} style={{background: '#fbbf24', color: '#0f172a', border: 'none', padding: '12px 24px', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer'}}>حفظ الأسعار الجديدة 💵</button>
                          </div>
                        </div>

                        {/* ب) التحكم في قفل المواعيد والأيام */}
                        <div>
                          <label style={S.label}>📅 اختر اليوم لتعديل حالته وقفل الساعات:</label>
                          <div style={{display: 'flex', gap: '12px', marginBottom: '16px'}}>
                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} style={{...S.dateInput, maxWidth: '250px'}} />
                            <button onClick={() => toggleDayDisable(selectedDate)} style={{background: isDayDisabled ? '#22c55e' : '#ef4444', color: '#fff', border: 'none', padding: '10px 20px', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer'}}>
                              {isDayDisabled ? "🔓 فتح اليوم بالكامل" : "🔒 إغلاق اليوم بالكامل"}
                            </button>
                          </div>

                          {!isDayDisabled && (
                            <div>
                              <label style={S.label}>⏱️ اضغط على أي ساعة لقفلها أو فتحها في هذا اليوم بشكل مخصص:</label>
                              <div style={S.slotsGrid}>
                                {TIME_SLOTS.map(time => {
                                  const isSlotDisabled = disabledSlots.includes(`${selectedDate}|${time}`);
                                  return (
                                    <div 
                                      key={time} 
                                      onClick={() => toggleSlotDisable(selectedDate, time)} 
                                      style={{
                                        padding: '12px 8px', borderRadius: '8px', textAlign: 'center', cursor: 'pointer', fontWeight: 'bold', fontSize: '13px',
                                        background: isSlotDisabled ? '#7f1d1d' : '#1e293b',
                                        border: isSlotDisabled ? '1px solid #ef4444' : '1px solid #475569',
                                        color: isSlotDisabled ? '#f87171' : '#f1f5f9'
                                      }}
                                    >
                                      {time} <span style={{display:'block', fontSize:11, marginTop:2}}>{isSlotDisabled ? "مغلق 🔒" : "شغال 🟢"}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                      {/* تقارير الأرباح الشهرية المخصصة */}
                      <div style={{...S.card, background: '#111827', marginBottom: '24px', padding: '20px'}}>
                        <h3 style={{margin: '0 0 16px 0', color: '#22c55e', fontSize: '17px'}}>📊 ميزه تقارير الأرباح الشهرية المخصصة:</h3>
                        <div style={{display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap', marginBottom: '16px'}}>
                          <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} style={S.select}>
                            {availableMonths.map(m => <option key={m} value={m}>{m}</option>)}
                          </select>
                          <button onClick={generateMonthlyReport} style={{background: '#22c55e', color: '#0f172a', border: 'none', padding: '10px 20px', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer'}}>إظهر التقرير الحالي 🔍</button>
                        </div>
                        <div style={{background: '#1e293b', padding: '14px 20px', borderRadius: '8px', border: '1px solid #334155', display: 'inline-block'}}>
                          <span style={{color:'#94a3b8', fontSize:'14px'}}>إيرادات شهر (<strong>{displayedReport.month}</strong>) المؤكدة هي: </span>
                          <span style={{fontWeight:'bold', fontSize: '20px', color: '#4ade80'}}>{displayedReport.total} جنيه</span>
                        </div>
                      </div>

                      {/* التبويبات وإدارة الحجوزات */}
                      <div style={S.adminRow}>
                        <div style={S.tabs}>
                          <button style={S.tabBtn(adminTab === "pending")} onClick={() => setAdminTab("pending")}>⌛ الانتظار ({pendingList.length})</button>
                          <button style={S.tabBtn(adminTab === "confirmed")} onClick={() => setAdminTab("confirmed")}>✅ المؤكدة ({confirmedList.length})</button>
                        </div>
                        <h2 style={{fontSize: 20, margin: 0}}>📋 لوحة إدارة العمليات الحالية</h2>
                      </div>

                      {adminTab === "pending" && (
                        pendingList.length === 0 ? <p style={{textAlign:'center', color:'#64748b'}}>لا توجد طلبات معلقة</p> :
                        pendingList.map(b => (
                          <div key={b.id} style={S.bookingCard}>
                            <div style={S.bookingHeader}>
                              <span style={{color: '#fbbf24', fontWeight: 'bold'}}>⏳ طلب جديد قيد المراجعة</span>
                              <span style={{fontSize: '18px', fontWeight: 'bold'}}>{b.name}</span>
                            </div>
                            <div style={S.bookingDetails}>
                              <div>📱 {b.phone}</div>
                              <div>📅 التاريخ: {b.date}</div>
                              <div>⏰ الوقت: {b.time} ({b.duration}س)</div>
                              <div>💰 السعر المتوقع: {b.price} ج</div>
                            </div>
                            <div style={S.actionRow}>
                              <button style={S.actionBtn("#ef4444", "#fff")} onClick={() => updateStatus(b, "cancelled")}>رفض وإلغاء ❌</button>
                              <button style={S.actionBtn("#22c55e", "#0f172a")} onClick={() => updateStatus(b, "confirmed")}>تأكيد وإرسال واتساب ✅</button>
                            </div>
                          </div>
                        ))
                      )}

                      {adminTab === "confirmed" && (
                        confirmedList.length === 0 ? <p style={{textAlign:'center', color:'#64748b'}}>لا توجد حجوزات مؤكدة</p> :
                        confirmedList.map(b => (
                          <div key={b.id} style={S.bookingCard}>
                            <div style={S.bookingHeader}>
                              <span style={{color: '#4ade80', fontWeight: 'bold'}}>{b.paid ? "🟢 مدفوع ومستلم" : "🔴 غير مدفوع"}</span>
                              <span style={{fontSize: '18px', fontWeight: 'bold'}}>{b.name}</span>
                            </div>
                            <div style={S.bookingDetails}>
                              <div>📱 {b.phone}</div>
                              <div>📅 التاريخ: {b.date}</div>
                              <div>⏰ {b.time} ({b.duration}س)</div>
                              <div>💰 السعر الإجمالي: {b.price} ج</div>
                            </div>
                            <div style={S.actionRow}>
                              <button style={S.actionBtn(b.paid ? "#ef4444" : "#3b82f6", "#fff")} onClick={() => togglePaid(b.id, b.paid)}>
                                {b.paid ? "تحويل لـ (غير مدفوع) 🔴" : "تحويل لـ (تم الدفع) 🟢"}
                              </button>
                              <button style={S.actionBtn("#334155", "#9ca3af")} onClick={() => updateStatus(b, "cancelled")}>إلغاء الحجز ⚠️</button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  )
                )
              )}

              {modal && (
                <div style={S.modalOverlay} onClick={() => setModal(null)}>
                  <div style={S.modalCard} onClick={e => e.stopPropagation()}>
                    <h3 style={S.modalTitle}>📝 طلب حجز جديد</h3>
                    
                    <div style={{marginBottom: "4px", fontSize: "14px", color: "#94a3b8"}}>اسم الزبون:</div>
                    <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} style={S.modalInput} placeholder="اكتب اسم الكابتن" />
                    
                    <div style={{marginBottom: "4px", fontSize: "14px", color: "#94a3b8"}}>رقم الموبايل:</div>
                    <input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} style={S.modalInput} placeholder="01xxxxxxxxx" />
                    
                    <div style={{marginBottom: "4px", fontSize: "14px", color: "#94a3b8"}}>مدة الحجز:</div>
                    <select value={form.duration} onChange={e => setForm({ ...form, duration: e.target.value })} style={S.modalInput}>
                      <option value="1">ساعة واحدة ⏱️</option>
                      <option value="2">ساعتين (٢ ساعة) ⏱️</option>
                      <option value="3">3 ساعات ⏱️</option>
                    </select>
                    
                    {formError && <p style={{color: '#ef4444', fontSize: '14px', fontWeight: 'bold', margin: '0 0 12px 0', textAlign: 'center'}}>{formError}</p>}
                    
                    <button 
                      style={{...S.modalBtn, opacity: isSubmitting ? 0.6 : 1, cursor: isSubmitting ? 'not-allowed' : 'pointer'}} 
                      onClick={handleBook}
                      disabled={isSubmitting}
                    >
                      {isSubmitting ? "⌛ جاري إرسال طلبك..." : "إرسال الطلب وتأكيد الحجز 🚀"}
                    </button>
                  </div>
                </div>
              )}

              <footer style={S.footer}>
                <div>تطوير بواسطة : <strong style={{color: '#22c55e'}}>Mokhtar Emad</strong>  © ٢٠٢٦ استكانه أرينا.</div>
              </footer>
            </div>
          );
        }

        const root = RoyalRoot || ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        var RoyalRoot = root;
    </script>
</body>
</html>
