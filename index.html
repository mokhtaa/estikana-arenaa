<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكانه أرينا - سيستم الحجز المطور</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🔐 إعدادات الربط الحية بالداتا بيز الخاصة بك
        const SUPABASE_URL = "https://wiugwyhpuhokhocttwbq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_zzDhn9DNIAdjJLn8aNzKzA_4IapbzcL";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // مواعيد العمل من 1 ظهراً إلى 12 منتصف الليل
        const TIME_SLOTS = [
          "13:00", "14:00", "15:00", "16:00", "17:00", "18:00",
          "19:00", "20:00", "21:00", "22:00", "23:00", "24:00"
        ];

        const FIELD_NAME = "استكانه أرينا";
        const ADMIN_PASSWORD = "19541954";

        function formatTo12Hour(timeStr) {
          let hour = parseInt(timeStr.split(":")[0]);
          if (hour === 24 || hour === 0) return "12:00 م";
          if (hour === 12) return "12:00 ظ";
          const period = hour >= 12 ? "م" : "ص";
          const adjustedHour = hour > 12 ? hour - 12 : hour;
          return `${String(adjustedHour).padStart(2, '0')}:00 ${period}`;
        }

        // حساب سعر الساعة (من 1 لـ 4 العصر بـ 100، ومن بعد 4 بـ 150)
        function getPriceForSlot(timeStr) {
          const hour = parseInt(timeStr.split(":")[0]);
          return hour >= 13 && hour < 16 ? 100 : 150;
        }

        function calculateBookingPrice(startTime, duration) {
          const startIdx = TIME_SLOTS.indexOf(startTime);
          if (startIdx === -1) return 0;
          let total = 0;
          for (let i = 0; i < duration; i++) {
            const slotTime = TIME_SLOTS[startIdx + i];
            if (slotTime) total += getPriceForSlot(slotTime);
          }
          return total;
        }

        function todayStr() { return new Date().toISOString().split("T")[0]; }

        function formatDate(d) {
          return new Date(d + "T00:00:00").toLocaleDateString("ar-EG", {
            weekday: "long", year: "numeric", month: "long", day: "numeric"
          });
        }

        function genId() { return Math.random().toString(36).slice(2, 9).toUpperCase(); }

        function openWA(phone, message) {
          window.open(`https://wa.me/2${phone}?text=${encodeURIComponent(message)}`, "_blank");
        }

        function buildConfirmMsg(b) {
          return `مرحباً ${b.name} 👋\n\n✅ *تم تأكيد حجزك في ${FIELD_NAME}* ⚽\n\n━━━━━━━━━━━━━━━━━━\n📅 التاريخ : ${formatDate(b.date)}\n⏰ الوقت   : ${formatTo12Hour(b.time)}\n⏱ المدة   : ${b.duration} ساعة\n💰 المبلغ  : ${b.price} جنيه\n━━━━━━━━━━━━━━━━━━\n\nبرجاء الحضور قبل الموعد بـ 10 دقائق 🙏\nنتمنى لك وقت ممتع! 🌟`;
        }

        function App() {
          const [view, setView] = useState("booking");
          const [bookings, setBookings] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedDate, setSelectedDate] = useState(todayStr());
          const [adminDate, setAdminDate] = useState(todayStr());
          const [modal, setModal] = useState(null);
          const [form, setForm] = useState({ name: "", phone: "", duration: "1" });
          const [formError, setFormError] = useState("");
          const [toast, setToast] = useState({ msg: "", type: "success" });
          const [adminTab, setAdminTab] = useState("pending");
          const [adminPass, setAdminPass] = useState("");
          const [adminUnlocked, setAdminUnlocked] = useState(() => localStorage.getItem("estikana_admin_logged") === "true");
          const [passError, setPassError] = useState("");
          const [detailModal, setDetailModal] = useState(null);

          useEffect(() => {
            fetchBookings();
            const channels = supabaseClient.channel('custom-all-channel')
              .on('postgres_changes', { event: '*', filter: 'table=eq.bookings' }, () => { fetchBookings(); })
              .subscribe();
            return () => { channels.unsubscribe(); };
          }, []);

          async function fetchBookings() {
            try {
              const { data, error } = await supabaseClient.from('bookings').select('*');
              if (!error && data) setBookings(data);
            } catch (e) { console.error(e); }
            setLoading(false);
          }

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            setView(params.get("view") === "admin" ? "admin" : "booking");
          }, []);

          function isTimeInPast(timeStr, dateStr) {
            if (dateStr !== todayStr()) return false;
            const now = new Date();
            const currentHour = now.getHours();
            const slotHour = parseInt(timeStr.split(":")[0]);
            return slotHour <= currentHour;
          }

          const dayBookings = bookings.filter(b => b.date === selectedDate && b.status !== "cancelled");
          const bookedSlots = new Set();
          dayBookings.forEach(b => {
            for (let i = 0; i < b.duration; i++) {
              const idx = TIME_SLOTS.indexOf(b.time);
              if (idx !== -1 && idx + i < TIME_SLOTS.length) bookedSlots.add(TIME_SLOTS[idx + i]);
            }
          });

          function isSlotAvailable(time, duration = 1) {
            const idx = TIME_SLOTS.indexOf(time);
            for (let i = 0; i < duration; i++) {
              if (idx + i >= TIME_SLOTS.length || bookedSlots.has(TIME_SLOTS[idx + i])) return false;
            }
            return true;
          }

          function showToast(msg, type = "success") {
            setToast({ msg, type });
            setTimeout(() => setToast({ msg: "", type: "success" }), 4000);
          }

          async function handleBook() {
            setFormError("");
            if (!form.name.trim()) { setFormError("من فضلك أدخل الاسم"); return; }
            if (!form.phone.match(/^01[0-9]{9}$/)) { setFormError("رقم الهاتف يجب أن يكون رقم مصري صحيح (11 رقم)"); return; }
            const dur = parseInt(form.duration);
            if (!isSlotAvailable(modal.time, dur)) { setFormError("الموعد أو الساعة التالية محجوزة بالفعل!"); return; }

            const newBooking = {
              id: genId(),
              name: form.name.trim(),
              phone: form.phone.trim(),
              date: selectedDate,
              time: modal.time,
              duration: dur,
              price: calculateBookingPrice(modal.time, dur),
              status: "pending",
              paid: false
            };

            const { error } = await supabaseClient.from('bookings').insert([newBooking]);
            if (error) {
              showToast("حدث خطأ أثناء إرسال الطلب للداتا بيز", "warn");
            } else {
              setModal(null);
              setForm({ name: "", phone: "", duration: "1" });
              showToast("✅ تم حجز الموعد بنجاح وحفظه سحابياً!");
              fetchBookings();
            }
          }

          async function doConfirm(b) {
            const { error } = await supabaseClient.from('bookings').update({ status: 'confirmed' }).eq('id', b.id);
            if (!error) {
              setDetailModal(null);
              openWA(b.phone, buildConfirmMsg(b));
              showToast("✅ تم تأكيد الحجز ونقل الحالة بنجاح!");
              fetchBookings();
            }
          }

          async function togglePaid(id, currentPaid) {
            await supabaseClient.from('bookings').update({ paid: !currentPaid }).eq('id', id);
            setDetailModal(prev => prev ? { ...prev, paid: !currentPaid } : null);
            fetchBookings();
          }

          async function cancelBooking(id) {
            if (!window.confirm("هل تريد إلغاء هذا الحجز نهائياً؟")) return;
            await supabaseClient.from('bookings').update({ status: 'cancelled' }).eq('id', id);
            setDetailModal(null);
            showToast("🚫 تم إلغاء الحجز بنجاح");
            fetchBookings();
          }

          function handleAdminLogin() {
            if (adminPass === ADMIN_PASSWORD) { 
              setAdminUnlocked(true); 
              localStorage.setItem("estikana_admin_logged", "true");
            } else { setPassError("كلمة المرور خاطئة"); }
          }

          const adminDayAll = bookings.filter(b => b.date === adminDate);
          const pendingList = adminDayAll.filter(b => b.status === "pending");
          const confirmedList = adminDayAll.filter(b => b.status === "confirmed");

          return (
            <div class="min-h-screen flex flex-col">
              <header class="bg-slate-800 px-6 py-4 flex justify-between items-center border-b-2 border-emerald-500 shadow-xl">
                <div class="text-2xl font-black text-emerald-400 flex items-center gap-2">⚽ {FIELD_NAME}</div>
                {view === "admin" && adminUnlocked && (
                  <button onClick={() => { setAdminUnlocked(false); localStorage.removeItem("estikana_admin_logged"); }} class="bg-red-700 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold transition">خروج 🚪</button>
                )}
              </header>

              {toast.msg && (
                <div class={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-bold text-slate-900 shadow-2xl z-50 text-center transition-all ${toast.type === "warn" ? "bg-amber-500" : "bg-emerald-400"}`}>
                  {toast.msg}
                </div>
              )}

              {loading ? (
                <div class="flex-1 flex items-center justify-center text-slate-400 text-lg">
                  <div class="animate-pulse">🔄 جاري مزامنة الداتا بيز اللحظية...</div>
                </div>
              ) : (
                view === "booking" ? (
                  <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6">
                    <div class="text-center py-6">
                      <h1 class="text-3xl font-black text-emerald-400">احجز ملعبك دلوقتي أونلاين</h1>
                      <p class="text-slate-400 mt-2 text-sm">تحديث فوري للمواعيد المتاحة والأسعار</p>
                    </div>

                    <div class="bg-slate-800 p-4 rounded-2xl mb-6 border border-slate-700 shadow-md">
                      <label class="block text-slate-400 text-sm font-bold mb-2">📅 اختر تاريخ اليوم المراد حجزه:</label>
                      <input type="date" value={selectedDate} min={todayStr()} onChange={e => setSelectedDate(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 w-full text-white font-bold focus:outline-none focus:border-emerald-500 transition" />
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                      {TIME_SLOTS.map(time => {
                        const booked = bookedSlots.has(time);
                        const past = isTimeInPast(time, selectedDate);
                        const unavailable = booked || past;
                        return (
                          <button key={time} disabled={unavailable} onClick={() => setModal({ time })} class={`p-4 rounded-xl text-center border transition-all flex flex-col justify-center items-center gap-1 ${unavailable ? "bg-red-950/40 border-red-900/60 text-red-400 cursor-not-allowed opacity-60" : "bg-emerald-950/60 border-emerald-500/40 hover:border-emerald-400 text-emerald-300 hover:scale-105 active:scale-95"}`}>
                            <span class="text-lg font-bold">{formatTo12Hour(time)}</span>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded bg-slate-900/60">
                              {booked ? "محجوز 🟥" : past ? "انتهى" : `${getPriceForSlot(time)} جنيه`}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </main>
                ) : (
                  <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6">
                    {!adminUnlocked ? (
                      <div class="bg-slate-800 p-6 rounded-2xl max-w-sm mx-auto my-12 border border-slate-700 shadow-2xl text-center">
                        <h2 class="text-xl font-black text-emerald-400 mb-4">لوحة تحكم المشرف</h2>
                        <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-center text-white mb-2" placeholder="أدخل كلمة المرور" />
                        {passError && <p class="text-red-400 text-xs my-1">{passError}</p>}
                        <button onClick={handleAdminLogin} class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-2 px-4 rounded-xl w-full mt-2 transition">دخول</button>
                      </div>
                    ) : (
                      <div>
                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                          <h2 class="text-2xl font-black text-emerald-400">🏟️ لوحة التحكم والإدارة</h2>
                          <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                            {[
                              { id: "pending", label: "قيد الانتظار" },
                              { id: "confirmed", label: "المؤكدة" },
                              { id: "all", label: "الكل اليوم" }
                            ].map(t => (
                              <button key={t.id} class={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${adminTab === t.id ? "bg-emerald-500 text-slate-900" : "text-slate-400 hover:text-white"}`} onClick={() => setAdminTab(t.id)}>{t.label}</button>
                            ))}
                          </div>
                        </div>

                        <div class="bg-slate-800 p-4 rounded-2xl mb-6 border border-slate-700 shadow-md">
                          <input type="date" value={adminDate} onChange={e => setAdminDate(e.target.value)} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 w-full text-white font-bold" />
                        </div>

                        <div class="space-y-2">
                          {adminTab === "pending" && pendingList.map(b => (
                            <div key={b.id} onClick={() => setDetailModal(b)} class="bg-slate-800 hover:bg-slate-750 p-4 rounded-xl border border-amber-500/30 flex justify-between items-center cursor-pointer transition">
                              <div><span class="font-bold text-white">{b.name}</span> <span class="text-xs text-slate-400 bg-slate-900 px-2 py-0.5 rounded mr-2">{formatTo12Hour(b.time)}</span></div>
                              <span class="text-amber-400 text-xs font-bold">انتظار التفعيل ←</span>
                            </div>
                          ))}
                          {adminTab === "confirmed" && confirmedList.map(b => (
                            <div key={b.id} onClick={() => setDetailModal(b)} class="bg-slate-800 hover:bg-slate-750 p-4 rounded-xl border border-emerald-500/30 flex justify-between items-center cursor-pointer transition">
                              <div><span class="font-bold text-white">{b.name}</span> <span class="text-xs text-slate-400 bg-slate-900 px-2 py-0.5 rounded mr-2">{formatTo12Hour(b.time)}</span></div>
                              <span class="text-emerald-400 text-xs font-bold">مؤكد ومحجوز ✓</span>
                            </div>
                          ))}
                          {adminTab === "all" && adminDayAll.map(b => (
                            <div key={b.id} onClick={() => setDetailModal(b)} class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center cursor-pointer">
                              <div><span class="font-bold text-white">{b.name}</span> <span class="text-slate-400 text-sm">({b.status === "confirmed" ? "مؤكد" : b.status === "cancelled" ? "ملغي" : "انتظار"})</span></div>
                              <span class="text-slate-400 text-xs">{formatTo12Hour(b.time)}</span>
                            </div>
                          ))}
                          {((adminTab === "pending" && pendingList.length === 0) || (adminTab === "confirmed" && confirmedList.length === 0) || (adminTab === "all" && adminDayAll.length === 0)) && (
                            <div class="text-center py-8 text-slate-500">لا توجد حجوزات لهذا اليوم حالياً.</div>
                          )}
                        </div>
                      </div>
                    )}
                  </main>
                )
              )}

              {modal && (
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn" onClick={() => setModal(null)}>
                  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <h3 class="text-xl font-black text-emerald-400 mb-4">📋 طلب حجز موعد جديد</h3>
                    <p class="text-sm text-slate-300 mb-4">الساعة المختارة: <span class="text-emerald-300 font-bold">{formatTo12Hour(modal.time)}</span></p>
                    
                    <div class="space-y-4">
                      <div>
                        <label class="block text-xs text-slate-400 font-bold mb-1">اسم العميل</label>
                        <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white" placeholder="اكتب اسم الكابتن" />
                      </div>
                      <div>
                        <label class="block text-xs text-slate-400 font-bold mb-1">رقم الهاتف (واتساب)</label>
                        <input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white text-left" placeholder="01xxxxxxxxx" />
                      </div>
                      <div>
                        <label class="block text-xs text-slate-400 font-bold mb-1">مدة اللعب</label>
                        <select value={form.duration} onChange={e => setForm({ ...form, duration: e.target.value })} class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 w-full text-white">
                          <option value="1">ساعة واحدة</option>
                          <option value="2">ساعتين متتاليتين</option>
                        </select>
                      </div>

                      <div class="p-3 bg-slate-900/60 rounded-xl border border-slate-700 text-center">
                        <span class="text-sm text-slate-400">إجمالي الحساب التقديري:</span>
                        <div class="text-2xl font-black text-emerald-400 mt-1">
                          {calculateBookingPrice(modal.time, parseInt(form.duration))} جنيه
                        </div>
                      </div>

                      {formError && <p class="text-red-400 text-xs font-bold">{formError}</p>}

                      <div class="flex gap-2 pt-2">
                        <button onClick={handleBook} class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl transition">تأكيد وحفظ للحجز</button>
                        <button onClick={() => setModal(null)} class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl transition">إلغاء</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {detailModal && (
                <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={() => setDetailModal(null)}>
                  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                    <h3 class="text-xl font-black text-emerald-400 mb-2">تفاصيل وإدارة الحجز</h3>
                    <p class="text-slate-400 text-sm mb-4">كود الحجز: <span class="font-mono text-slate-300 font-bold">#{detailModal.id}</span></p>

                    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700 space-y-2 mb-4 text-sm">
                      <p><span class="text-slate-400">اسم الكابتن:</span> <strong class="text-white text-base">{detailModal.name}</strong></p>
                      <p><span class="text-slate-400">رقم الهاتف:</span> <span class="text-slate-300 font-mono">{detailModal.phone}</span></p>
                      <p><span class="text-slate-400">توقيت الحجز:</span> <span class="text-emerald-300 font-bold">{formatTo12Hour(detailModal.time)}</span> ({detailModal.duration} ساعة)</p>
                      <p><span class="text-slate-400">المبلغ المطلوب:</span> <span class="text-amber-400 font-bold">{detailModal.price} جنيه</span></p>
                      <p><span class="text-slate-400">حالة الدفع الحالي:</span> <span class={`px-2 py-0.5 rounded font-bold text-xs ${detailModal.paid ? "bg-emerald-950 text-emerald-400" : "bg-red-950 text-red-400"}`}>{detailModal.paid ? "مدفوع بالكامل" : "غير مدفوع"}</span></p>
                    </div>

                    <div class="flex flex-col gap-2">
                      {detailModal.status === "pending" && (
                        <button onClick={() => doConfirm(detailModal)} class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl w-full transition flex justify-center items-center gap-1">✔️ تأكيد الحجز وإرسال واتساب</button>
                      )}
                      <button onClick={() => togglePaid(detailModal.id, detailModal.paid)} class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2.5 rounded-xl transition">💵 تبديل حالة الدفع (مدفوع / غير مدفوع)</button>
                      <button onClick={() => cancelBooking(detailModal.id)} class="bg-red-900/40 hover:bg-red-900 text-red-400 hover:text-white font-bold py-2.5 rounded-xl transition border border-red-800">🚫 إلغاء هذا الحجز بالكامل</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
